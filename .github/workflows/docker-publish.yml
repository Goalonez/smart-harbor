name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: goalonez/smart-harbor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse release tag
        id: release
        run: bash .github/scripts/parse-release-tag.sh

      - name: Validate package version
        if: steps.release.outputs.publish_web == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if (pkg.version !== process.env.RELEASE_VERSION) { console.error('package.json version ' + pkg.version + ' does not match release version ' + process.env.RELEASE_VERSION); process.exit(1); }"

      - name: Set up Docker Buildx
        if: steps.release.outputs.publish_web == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.release.outputs.publish_web == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        if: steps.release.outputs.publish_web == 'true'
        id: meta
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:${{ steps.release.outputs.version }}"
            echo "${IMAGE_NAME}:${{ steps.release.outputs.major_minor }}"
            echo "${IMAGE_NAME}:latest"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        if: steps.release.outputs.publish_web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
