name: Build Extension Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: EXTENSION_VERSION="${GITHUB_REF_NAME#v}" npm run build:extension

      - name: Package extension
        run: EXTENSION_VERSION="${GITHUB_REF_NAME#v}" npm run package:extension

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: extension/smart-harbor-new-tab-${{ github.ref_name }}.zip
