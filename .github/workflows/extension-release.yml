name: Build Extension Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse release tag
        id: release
        run: bash .github/scripts/parse-release-tag.sh

      - name: Set up Node.js
        if: steps.release.outputs.publish_extension == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.release.outputs.publish_extension == 'true'
        run: npm ci

      - name: Validate package version
        if: steps.release.outputs.publish_extension == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if (pkg.version !== process.env.RELEASE_VERSION) { console.error('package.json version ' + pkg.version + ' does not match release version ' + process.env.RELEASE_VERSION); process.exit(1); }"

      - name: Build extension
        if: steps.release.outputs.publish_extension == 'true'
        env:
          EXTENSION_VERSION: ${{ steps.release.outputs.version }}
        run: npm run build:extension

      - name: Package extension
        if: steps.release.outputs.publish_extension == 'true'
        env:
          EXTENSION_VERSION: ${{ steps.release.outputs.version }}
          EXTENSION_ARTIFACT_TAG: ${{ steps.release.outputs.tag }}
        run: npm run package:extension

      - name: Validate release notes
        if: steps.release.outputs.publish_extension == 'true'
        run: |
          test -f "release-notes/${{ steps.release.outputs.tag }}.md"

      - name: Publish GitHub release asset
        if: steps.release.outputs.publish_extension == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/${{ steps.release.outputs.tag }}.md
          files: extension/smart-harbor-new-tab-${{ steps.release.outputs.tag }}.zip
