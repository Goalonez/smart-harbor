name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse release tag
        id: release
        run: bash .github/scripts/parse-release-tag.sh

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          cache: npm

      - name: Validate package version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if (pkg.version !== process.env.RELEASE_VERSION) { console.error('package.json version ' + pkg.version + ' does not match release version ' + process.env.RELEASE_VERSION); process.exit(1); }"

      - name: Validate release notes
        run: |
          test -f "release-notes/${{ steps.release.outputs.tag }}.md"

      - name: Prepare release body
        id: release_body
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PUBLISH_EXTENSION: ${{ steps.release.outputs.publish_extension }}
        run: |
          body_path="$(mktemp)"
          cp "release-notes/${RELEASE_TAG}.md" "${body_path}"

          if [ "${PUBLISH_EXTENSION}" != "true" ]; then
            {
              printf '\n---\n\n'
              printf '%s\n\n' '**插件下载 / Extension Download**'
              printf '%s\n' '- 本次版本不包含插件更新；如需安装浏览器插件，请前往 GitHub Releases 下载最近一个附带 `smart-harbor-new-tab-*.zip` 资产的版本。'
              printf '%s\n' '- This release does not include extension updates. To install the browser extension, download the most recent release on GitHub Releases that includes a `smart-harbor-new-tab-*.zip` asset.'
            } >> "${body_path}"
          fi

          printf 'body_path=%s\n' "${body_path}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        if: steps.release.outputs.publish_extension == 'true'
        run: npm ci

      - name: Build extension
        if: steps.release.outputs.publish_extension == 'true'
        env:
          EXTENSION_VERSION: ${{ steps.release.outputs.version }}
        run: npm run build:extension

      - name: Package extension
        if: steps.release.outputs.publish_extension == 'true'
        env:
          EXTENSION_VERSION: ${{ steps.release.outputs.version }}
          EXTENSION_ARTIFACT_TAG: ${{ steps.release.outputs.tag }}
        run: npm run package:extension

      - name: Publish GitHub release with extension asset
        if: steps.release.outputs.publish_extension == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_body.outputs.body_path }}
          files: extension/smart-harbor-new-tab-${{ steps.release.outputs.tag }}.zip
          fail_on_unmatched_files: true

      - name: Publish GitHub release notes
        if: steps.release.outputs.publish_extension != 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_body.outputs.body_path }}
